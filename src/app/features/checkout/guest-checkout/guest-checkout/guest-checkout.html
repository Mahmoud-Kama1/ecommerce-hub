<div class="page-header">
  <h1>Guest Checkout</h1>
  <p>Checkout without creating an account.</p>
</div>

@if (cartService.cart().items.length === 0) {
  <div class="card">
    <p>Your cart is empty.</p>
    <a routerLink="/products" class="btn btn-primary">Browse Products</a>
  </div>
} @else {
  <div class="card-grid" style="grid-template-columns: 2fr 1fr">
    <div class="card">
      <h3>Contact & Shipping</h3>
      <form [formGroup]="form" (ngSubmit)="placeOrder()">
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" />
        </div>
        <div class="form-group">
          <label>First Name</label>
          <input formControlName="firstName" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input formControlName="lastName" />
        </div>
        <div class="form-group">
          <label>Street</label>
          <input formControlName="street" />
        </div>
        <div class="form-group">
          <label>City</label>
          <input formControlName="city" />
        </div>
        <div class="form-group">
          <label>State</label>
          <input formControlName="state" />
        </div>
        <div class="form-group">
          <label>Postal Code</label>
          <input formControlName="postalCode" />
        </div>
        <div class="form-group">
          <label>Country</label>
          <input formControlName="country" />
        </div>
        <div class="form-group">
          <label>Payment Method</label>
          <select formControlName="paymentMethod">
            <option value="card">Credit / Debit Card</option>
            <option value="paypal">PayPal</option>
          </select>
        </div>
        @if (error) {
          <p class="error">{{ error }}</p>
        }
        <button type="submit" class="btn btn-primary" [disabled]="submitting || form.invalid">
          {{ submitting ? 'Placing order…' : 'Place Order' }}
        </button>
      </form>
    </div>

    <div class="card">
      <h3>Order Summary</h3>
      <p><strong>Total: ${{ cartService.cart().total | number: '1.2-2' }}</strong></p>
      <a routerLink="/cart" class="btn btn-secondary">Back to Cart</a>
    </div>
  </div>
}
