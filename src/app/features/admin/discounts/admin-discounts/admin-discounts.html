<div class="page-header">
  <h1>Discounts & Promo Codes</h1>
</div>

<div class="card">
  @for (promo of promos; track promo.code) {
    <div style="padding: 0.75rem 0; border-bottom: 1px solid var(--border)">
      <strong>{{ promo.code }}</strong> — {{ promo.type }} (min {{ promo.min }})
      <span style="color: var(--success); margin-left: 0.5rem">{{ promo.active ? 'Active' : 'Inactive' }}</span>
    </div>
  }
</div>
