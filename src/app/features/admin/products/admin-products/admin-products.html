<div class="page-header">
  <h1>Products</h1>
  <p>Catalog management (mock data).</p>
</div>

<div class="card">
  @for (product of products; track product.id) {
    <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border)">
      <div>
        <strong>{{ product.name }}</strong>
        <p style="margin: 0; color: var(--text-muted)">SKU: {{ product.sku }} · Stock: {{ product.stock }}</p>
      </div>
      <div>
        <span>${{ product.price | number: '1.2-2' }}</span>
        <a [routerLink]="['/products', product.id]" class="btn btn-secondary" style="margin-left: 0.5rem">View</a>
      </div>
    </div>
  }
</div>
