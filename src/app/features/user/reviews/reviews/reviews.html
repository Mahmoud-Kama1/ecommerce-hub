<div class="page-header">
  <h1>My Reviews</h1>
  <p>Reviews you've submitted.</p>
</div>

<a routerLink="/profile" class="btn btn-secondary" style="margin-bottom: 1rem">← Back to Profile</a>

@if (reviews.length === 0) {
  <div class="card"><p>You haven't written any reviews yet.</p></div>
} @else {
  @for (review of reviews; track review.id) {
    <div class="card" style="margin-bottom: 0.75rem">
      <strong>{{ review.productName }}</strong>
      <app-rating-stars [rating]="review.rating" />
      <p>{{ review.comment }}</p>
      <small style="color: var(--text-muted)">{{ review.createdAt | date: 'mediumDate' }}</small>
    </div>
  }
}
