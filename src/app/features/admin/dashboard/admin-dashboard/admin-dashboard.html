<div class="page-header">
  <h1>Admin Dashboard</h1>
  <p>Overview of marketplace activity.</p>
</div>

<div class="card-grid">
  <div class="card"><h3>Users</h3><p style="font-size: 2rem; font-weight: 700">{{ stats.users }}</p></div>
  <div class="card"><h3>Products</h3><p style="font-size: 2rem; font-weight: 700">{{ stats.products }}</p></div>
  <div class="card"><h3>Orders</h3><p style="font-size: 2rem; font-weight: 700">{{ stats.orders }}</p></div>
  <div class="card"><h3>Revenue</h3><p style="font-size: 2rem; font-weight: 700">${{ stats.revenue | number: '1.2-2' }}</p></div>
</div>
