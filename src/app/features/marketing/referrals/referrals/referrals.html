<div class="page-header">
  <h1>Refer a Friend</h1>
  <p>Share your link and earn $10 credit when friends make their first purchase.</p>
</div>

<div class="card" style="max-width: 520px">
  <p>Your referral link:</p>
  <code style="display: block; padding: 0.75rem; background: var(--background); border-radius: 0.5rem; word-break: break-all">
    {{ referralLink }}
  </code>
  <button type="button" class="btn btn-primary" style="margin-top: 1rem" (click)="copyLink()">
    {{ copied ? 'Copied!' : 'Copy Link' }}
  </button>
  <p style="margin-top: 1rem; color: var(--text-muted)">Referrals completed: 0 · Credits earned: $0</p>
</div>
