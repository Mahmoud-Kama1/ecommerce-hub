<div class="page-header">
  <h1>Seller Profile</h1>
</div>

<div class="card" style="max-width: 520px">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="form-group"><label>Store Name</label><input formControlName="storeName" /></div>
    <div class="form-group"><label>Description</label><textarea formControlName="description" rows="3"></textarea></div>
    <div class="form-group"><label>Payout Email</label><input formControlName="payoutEmail" /></div>
    @if (message) { <p style="color: var(--success)">{{ message }}</p> }
    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>
