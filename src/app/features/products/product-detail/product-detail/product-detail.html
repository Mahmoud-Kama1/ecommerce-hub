@if (notFound) {
  <div class="card">
    <h1>Product Not Found</h1>
    <a routerLink="/products" class="btn btn-primary">Browse Products</a>
  </div>
} @else if (product) {
  <a routerLink="/products">← Back to products</a>
  <div class="card" style="margin-top: 1rem">
    @if (product.images[0]?.url) {
      <img [src]="product.images[0].url" [alt]="product.name" style="max-width: 100%; border-radius: 0.5rem; margin-bottom: 1rem" />
    }
    <h1>{{ product.name }}</h1>
    <app-rating-stars [rating]="product.rating" [count]="product.reviewCount" />
    <p>{{ product.description }}</p>
    <p class="price">${{ product.price | number: '1.2-2' }}</p>
    <p>Stock: {{ product.stock }}</p>
    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap">
      <button class="btn btn-primary" (click)="addToCart()" [disabled]="product.stock === 0">
        Add to Cart
      </button>
      <button class="btn btn-secondary" (click)="toggleWishlist()">
        {{ wishlist.has(product.id) ? 'Remove from Wishlist' : 'Add to Wishlist' }}
      </button>
    </div>
  </div>
} @else {
  <p>Loading product…</p>
}
