<div class="page-header">
  <h1>My Profile</h1>
  <p>Manage your account information.</p>
</div>

<div class="card" style="max-width: 480px">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="form-group">
      <label>First Name</label>
      <input formControlName="firstName" />
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input formControlName="lastName" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input formControlName="email" />
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input formControlName="phone" />
    </div>
    <p>Role: <strong>{{ auth.currentUser()?.role }}</strong></p>
    <p>Loyalty points: <strong>{{ auth.currentUser()?.loyaltyPoints ?? 0 }}</strong></p>
    @if (message) {
      <p style="color: var(--success)">{{ message }}</p>
    }
    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
  <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap">
    <a routerLink="/profile/addresses" class="btn btn-secondary">Addresses</a>
    <a routerLink="/profile/payment-methods" class="btn btn-secondary">Payment Methods</a>
    <a routerLink="/reviews" class="btn btn-secondary">My Reviews</a>
  </div>
</div>
