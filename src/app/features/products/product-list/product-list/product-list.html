<div class="page-header">
  <h1>Products</h1>
  <p>Search and filter by name, price, category, and stock.</p>
</div>

<form class="filters card" [formGroup]="filterForm" (ngSubmit)="loadProducts()">
  <div class="form-group">
    <label for="search">Search</label>
    <input id="search" formControlName="search" placeholder="Search by name" />
  </div>
  <div class="form-group">
    <label for="minPrice">Min Price</label>
    <input id="minPrice" type="number" formControlName="minPrice" />
  </div>
  <div class="form-group">
    <label for="maxPrice">Max Price</label>
    <input id="maxPrice" type="number" formControlName="maxPrice" />
  </div>
  <div class="form-group">
    <label>
      <input type="checkbox" formControlName="inStockOnly" />
      In stock only
    </label>
  </div>
  <button class="btn btn-primary" type="submit">Apply Filters</button>
</form>

@if (loading$ | async) {
  <p>Loading...</p>
} @else {
  <div class="card-grid">
    @for (product of products$ | async; track product.id) {
      <app-product-card [product]="product" />
    }
  </div>
}
