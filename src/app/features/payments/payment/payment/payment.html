<div class="page-header">
  <h1>Payment</h1>
  <p>Mock payment gateway — Stripe/PayPal integration placeholder.</p>
</div>

<div class="card-grid" style="grid-template-columns: 2fr 1fr">
  <div class="card">
    <h3>Card Details</h3>
    <form [formGroup]="form" (ngSubmit)="pay()">
      <div class="form-group">
        <label>Name on Card</label>
        <input formControlName="name" />
      </div>
      <div class="form-group">
        <label>Card Number</label>
        <input formControlName="cardNumber" />
      </div>
      <div class="form-group">
        <label>Expiry</label>
        <input formControlName="expiry" placeholder="MM/YY" />
      </div>
      <div class="form-group">
        <label>CVC</label>
        <input formControlName="cvc" />
      </div>
      @if (message) {
        <p style="color: var(--success)">{{ message }}</p>
      }
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Authorize Payment</button>
    </form>
  </div>
  <div class="card">
    <h3>Cart Total</h3>
    <p><strong>${{ cart.cart().total | number: '1.2-2' }}</strong></p>
    <a routerLink="/checkout" class="btn btn-primary">Go to Checkout</a>
  </div>
</div>
